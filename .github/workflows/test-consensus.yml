name: Test Consensus

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate simulator
        run: |
          python -m compileall swarm_simulator/app

      - name: Validate drone agent
        run: |
          cd drone_agent
          go test ./...

      - name: Validate visualizer
        run: |
          cd swarm_visualizer
          npm install
          npm run build
